name: CI Linux Build

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix with Flakes
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build and test project
        run: |
          nix build .#fil-test -L

      - name: Check coverage file exists
        run: |
          ls -la result/coverage/ || echo "coverage directory not found"
          file result/coverage/cobertura.xml
          head -20 result/coverage/cobertura.xml

      - name: codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: result/coverage/cobertura.xml
          language: cpp

      - name: Fix compile_commands.json paths
        run: |
          cp result/compile_commands.json compile_commands.json
          python3 - <<'EOF'
          import json, re, os
          workspace = os.getcwd()
          with open('compile_commands.json', 'r') as f:
              content = f.read()
              data = json.loads(content)
          nix_prefix = None
          for entry in data:
              file_path = entry.get('file', '')
              match = re.match(r'^(/nix/store/[^/]+)', file_path)
              if match:
                  nix_prefix = match.group(1)
                  break
          if nix_prefix:
              content = content.replace(nix_prefix, workspace)
              with open('compile_commands.json', 'w') as f:
                  f.write(content)
              print(f"Replaced '{nix_prefix}' with '{workspace}'")
          else:
              print("No Nix store prefix found, file may already have correct paths")
          EOF

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
