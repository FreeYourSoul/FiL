name: CI Linux Build

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix with Flakes
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build and test project
        run: |
          nix build .#fil-test -L

      - name: Check coverage file exists
        run: |
          ls -la result/coverage/ || echo "coverage directory not found"
          file result/coverage/cobertura.xml
          head -20 result/coverage/cobertura.xml

      - name: codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: result/coverage/cobertura.xml
          language: cpp

      - name: Fix compile_commands.json paths
        run: |
          cp result/compile_commands.json compile_commands.json
          python3 - <<'EOF'
          import json, re, os
          workspace = os.getcwd()
          with open('compile_commands.json', 'r') as f:
              content = f.read()
              data = json.loads(content)
          if not data:
              print("compile_commands.json is empty")
              exit(0)
          print("First entry for debugging:")
          print(json.dumps(data[0], indent=2))
          source_prefix = None
          for entry in data:
              file_path = entry.get('file', '')
              if not file_path or not os.path.isabs(file_path):
                  continue
              # Strategy 1: Nix store path (e.g. /nix/store/<hash>-fil/...)
              m = re.match(r'^(/nix/store/[^/]+)', file_path)
              if m:
                  source_prefix = m.group(1)
                  break
              # Strategy 2: Nix build-sandbox path (e.g. /build/source/...)
              # Find the longest leading prefix whose removal yields a path that
              # exists inside the current workspace.
              parts = [p for p in file_path.split('/') if p]
              for i in range(1, len(parts)):
                  relative = '/'.join(parts[i:])
                  if os.path.exists(os.path.join(workspace, relative)):
                      source_prefix = '/' + '/'.join(parts[:i])
                      break
              if source_prefix is not None:
                  break
          if source_prefix:
              content = content.replace(source_prefix, workspace)
              with open('compile_commands.json', 'w') as f:
                  f.write(content)
              print(f"Replaced '{source_prefix}' with '{workspace}'")
          else:
              print("Could not determine source prefix; paths may already be correct")
          EOF

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
